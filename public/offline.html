<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Ava Rewase Membership</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fbf9f4;
            font-family: -apple-system, system-ui, sans-serif;
            color: #1b1c19;
        }
        .card { text-align: center; max-width: 22rem; padding: 1.5rem; }
        .ring {
            width: 4rem; height: 4rem; margin: 0 auto 1rem;
            border-radius: 9999px; border: 8px solid #fed65b;
            display: flex; align-items: center; justify-content: center;
        }
        .dot { width: 1.25rem; height: 1.25rem; border-radius: 9999px; background: #fed65b; }
        h1 { font-size: 1.1rem; font-weight: 700; color: #04162e; margin: 0 0 .25rem; }
        p { font-size: .875rem; color: #64748b; margin: 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="ring"><div class="dot"></div></div>
        <h1>You're offline</h1>
        <p>Check your connection and try again.</p>
    </div>
</body>
</html>
